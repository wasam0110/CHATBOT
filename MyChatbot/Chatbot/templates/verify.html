{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify Email &mdash; Chatbot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>
<body>
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">
        <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="4" y="8" width="32" height="24" rx="4" stroke="#4d7c5f" stroke-width="2.2"/>
          <path d="M4 14l16 10 16-10" stroke="#4d7c5f" stroke-width="2.2" stroke-linecap="round"/>
          <circle cx="30" cy="28" r="7" fill="#080b09" stroke="#4d7c5f" stroke-width="2"/>
          <path d="M27 28l2 2 4-4" stroke="#4d7c5f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h1 class="auth-title">Verify Your Email</h1>
      <p class="auth-subtitle">Enter the 6-digit code sent to your inbox</p>
    </div>

    {% if messages %}
    <ul class="messages">
      {% for message in messages %}
      <li class="{{ message.tags }}">{{ message }}</li>
      {% endfor %}
    </ul>
    {% endif %}

    <form method="POST" action="{% url 'verify_email' %}">
      {% csrf_token %}

      <div class="form-group">
        <label class="form-label" for="code">Verification Code</label>
        <div class="field-wrap">
          <span class="field-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </span>
          <input id="code" class="form-input" type="text" name="code" placeholder="123456" maxlength="6" pattern="[0-9]{6}" inputmode="numeric" required autocomplete="one-time-code">
        </div>
      </div>

      <button type="submit" class="btn-primary">Verify Email</button>
    </form>

    <p class="auth-footer">Didn&rsquo;t receive a code? <a href="{% url 'register' %}">Try again</a></p>
  </div>
</body>
</html>
