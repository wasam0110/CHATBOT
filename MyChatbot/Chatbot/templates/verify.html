<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Verification</title>
    <style>
        body {
            background: #f4f6f9;
            font-family: 'Poppins', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .verify-box {
            background: white;
            padding: 40px 35px;
            border-radius: 16px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            width: 360px;
            text-align: center;
        }

        .verify-box h2 {
            margin-bottom: 25px;
            color: #333;
        }

        .verify-box input {
            width: 100%;
            padding: 12px 14px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            transition: 0.2s;
        }

        .verify-box input:focus {
            border-color: #007bff;
            box-shadow: 0 0 5px rgba(0, 123, 255, 0.3);
        }

        .verify-box button {
            width: 100%;
            background: #007bff;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .verify-box button:hover {
            background: #0056b3;
        }
    </style>
</head>

<body>
    <div class="verify-box">
        <form method="POST">
            {% csrf_token %}
            <h2>Enter Verification Code</h2>
            <input type="text" name="code" placeholder="6-digit code" required>
            <button type="submit">Verify</button>
        </form>
    </div>
</body>

</html>
