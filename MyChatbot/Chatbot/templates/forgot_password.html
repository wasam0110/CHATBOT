{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password &mdash; Chatbot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>
<body>
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">
        <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="20" cy="20" r="15" stroke="#4d7c5f" stroke-width="2.2"/>
          <path d="M15 16a5 5 0 0 1 10 0c0 3-5 5-5 8" stroke="#4d7c5f" stroke-width="2.2" stroke-linecap="round"/>
          <circle cx="20" cy="29" r="1.5" fill="#4d7c5f"/>
        </svg>
      </div>
      <h1 class="auth-title">Reset Password</h1>
      <p class="auth-subtitle">We'll send a reset code to your email</p>
    </div>

    {% if messages %}
    <ul class="messages">
      {% for message in messages %}
      <li class="{{ message.tags }}">{{ message }}</li>
      {% endfor %}
    </ul>
    {% endif %}

    <form method="POST" action="{% url 'forgot_password' %}">
      {% csrf_token %}

      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <div class="field-wrap">
          <span class="field-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="4" width="20" height="16" rx="2"/>
              <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
            </svg>
          </span>
          <input id="email" class="form-input" type="email" name="email" placeholder="your@email.com" required autocomplete="email">
        </div>
      </div>

      <button type="submit" class="btn-primary">Send Reset Code</button>
    </form>

    <p class="auth-footer">Remembered it? <a href="{% url 'login' %}">Back to login</a></p>
  </div>
</body>
</html>
