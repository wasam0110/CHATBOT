<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Forgot Password</title>
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: #0f3460;
            padding: 40px 30px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            text-align: center;
            width: 350px;
            color: #fff;
        }

        h2 {
            margin-bottom: 20px;
            font-weight: 600;
            color: #e6e6e6;
        }

        input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            outline: none;
            font-size: 14px;
        }

        input:focus {
            border: 2px solid #00bcd4;
        }

        button {
            background-color: #00bcd4;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            transition: 0.3s;
            width: 100%;
        }

        button:hover {
            background-color: #008c9e;
        }
    </style>
</head>

<body>
    <div class="container">
        <form method="POST">
            {% csrf_token %}
            <h2>Forgot Password</h2>
            <input type="email" name="email" placeholder="Enter your email" required><br>
            <button type="submit">Send Reset Code</button>
        </form>
    </div>
</body>

</html>
