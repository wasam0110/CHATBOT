{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password &mdash; Chatbot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>
<body>
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">
        <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="10" y="18" width="20" height="15" rx="3" stroke="#4d7c5f" stroke-width="2.2"/>
          <path d="M14 18v-5a6 6 0 0 1 12 0v5" stroke="#4d7c5f" stroke-width="2.2" stroke-linecap="round"/>
          <circle cx="20" cy="25.5" r="2" fill="#4d7c5f"/>
          <path d="M20 27.5v2" stroke="#4d7c5f" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <h1 class="auth-title">New Password</h1>
      <p class="auth-subtitle">Enter the code from your email and choose a new password</p>
    </div>

    {% if messages %}
    <ul class="messages">
      {% for message in messages %}
      <li class="{{ message.tags }}">{{ message }}</li>
      {% endfor %}
    </ul>
    {% endif %}

    <form method="POST" action="{% url 'reset_password' %}">
      {% csrf_token %}

      <div class="form-group">
        <label class="form-label" for="code">Reset Code</label>
        <div class="field-wrap">
          <span class="field-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </span>
          <input id="code" class="form-input" type="text" name="code" placeholder="6-digit code" maxlength="6" pattern="[0-9]{6}" inputmode="numeric" required autocomplete="one-time-code">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="new_password">New Password</label>
        <div class="field-wrap">
          <span class="field-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </span>
          <input id="new_password" class="form-input" type="password" name="new_password" placeholder="Enter new password" required autocomplete="new-password">
          <button type="button" class="pass-toggle" onclick="togglePass('new_password', this)" aria-label="Toggle password">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-primary">Reset Password</button>
    </form>

    <p class="auth-footer">Back to <a href="{% url 'login' %}">Sign in</a></p>
  </div>

<script>
function togglePass(id, btn) {
  const input = document.getElementById(id);
  const show = input.type === 'password';
  input.type = show ? 'text' : 'password';
  btn.innerHTML = show
    ? `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`
    : `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
}
</script>
</body>
</html>
